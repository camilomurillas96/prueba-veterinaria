<div class="container mt-4">
  <h3>Registrar Nuevo Usuario</h3>
  <div class="card p-4">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Nombre</label>
        <input [(ngModel)]="usuario.nombre" class="form-control" placeholder="Nombre">
      </div>
      <div class="col-md-6 mb-3">
        <label>Apellido</label>
        <input [(ngModel)]="usuario.apellido" class="form-control" placeholder="Apellido">
      </div>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label>Tipo Documento</label>
        <select [(ngModel)]="usuario.tipoDocumento" class="form-control">
          <option value="CC">Cédula de Ciudadanía (CC)</option>
          <option value="CE">Cédula de Extranjería (CE)</option>
          <option value="TI">Tarjeta de Identidad (TI)</option>
        </select>
      </div>
      <div class="col-md-4 mb-3">
        <label>Documento Identificación</label>
        <input [(ngModel)]="usuario.documentoIdentificacion" type="number" class="form-control"  placeholder="0">
      </div>
      <div class="col-md-4 mb-3">
        <label>Sexo</label>
        <select [(ngModel)]="usuario.sexo" class="form-control">
          <option value="1">Masculino</option>
          <option value="2">Femenino</option>
        </select>
      </div>
    </div>

    <div class="mb-3" *ngIf="isEditMode">
        <label>Estado</label>
        <select [(ngModel)]="usuario.estado" class="form-control">
            <option value="ACTIVO">Activo</option>
            <option value="INACTIVO">Inactivo</option>
        </select>
    </div>

    <button (click)="guardar()" class="btn btn-success">
      {{ isEditMode ? 'Actualizar' : 'Guardar' }}
    </button>
  </div>
</div>
